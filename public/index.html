<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading">جاري التحميل...</div>
    <div id="main" style="display:none;">
      <header>
        <!-- شعار الدرع المالي -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:42px; height:42px; border-radius:8px; margin-left:12px;">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
            </linearGradient>
          </defs>
          <path d="M50 5 L85 15 L85 55 C85 75 65 90 50 95 C35 90 15 75 15 55 L15 15 Z" fill="url(#grad)" stroke="#ffffff" stroke-width="2"/>
          <rect x="30" y="40" width="40" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
          <rect x="30" y="52" width="40" height="6" rx="2" fill="#ffffff" opacity="0.9"/>
          <text x="50" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff">ر</text>
        </svg>
        <h1>الراجحي للمحاسبة</h1>
        <span id="user-name"></span>
      </header>
      <nav>
        <button class="tab active" data-tab="dashboard">لوحة التحكم</button>
        <button class="tab" data-tab="items">المواد</button>
        <button class="tab" data-tab="sale-invoice">فاتورة مبيعات</button>
        <button class="tab" data-tab="purchase-invoice">فاتورة مشتريات</button>
        <button class="tab" data-tab="customers">العملاء</button>
        <button class="tab" data-tab="suppliers">الموردين</button>
        <button class="tab" data-tab="categories">التصنيفات</button>
        <button class="tab" data-tab="payments">الدفعات</button>
        <button class="tab" data-tab="invoices">الفواتير</button>
        <button class="tab" data-tab="reports">التقارير</button>
      </nav>
      <div id="tab-content"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
