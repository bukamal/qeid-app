<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-container">
      <div class="loader-logo">ر</div>
      <div class="loader-bar"><div class="loader-progress"></div></div>
      <p class="loader-text">جاري تهيئة النظام...</p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Modal Portal -->
  <div id="modal-portal"></div>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
      </div>
      <div class="brand-text">
        <h2>الراجحي</h2>
        <span>نظام المحاسبة الذكي</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Generated by JS -->
    </nav>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name-sidebar">...</span>
    </div>
  </aside>

  <!-- Main Layout -->
  <div class="layout">
    <header class="top-bar">
      <button class="menu-toggle" id="menu-toggle" aria-label="القائمة">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title-wrapper">
        <h1 class="page-title" id="page-title">لوحة التحكم</h1>
        <span class="page-subtitle" id="page-subtitle">نظرة عامة على أداء عملك</span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-help" title="المساعدة">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
      </div>
    </header>

    <main class="content" id="tab-content">
      <!-- Dynamic content -->
    </main>
  </div>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-item active" data-tab="dashboard">
      <svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="bottom-label">الرئيسية</span>
    </button>
    <button class="bottom-item" data-tab="items">
      <svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      <span class="bottom-label">المواد</span>
    </button>
    <button class="bottom-item" data-tab="sale-invoice">
      <div class="bottom-fab">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </div>
      <span class="bottom-label">بيع</span>
    </button>
    <button class="bottom-item" data-tab="invoices">
      <svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="bottom-label">الفواتير</span>
    </button>
    <button class="bottom-item" data-tab="more">
      <svg class="bottom-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      <span class="bottom-label">المزيد</span>
    </button>
  </nav>

  <!-- Mobile More Menu -->
  <div id="more-menu" class="sheet-overlay" style="display:none;">
    <div class="sheet-backdrop"></div>
    <div class="sheet-content">
      <div class="sheet-handle"></div>
      <div class="sheet-header">القائمة</div>
      <div class="sheet-grid" id="sheet-grid">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
