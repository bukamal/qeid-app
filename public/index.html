<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading" style="display:none;">جاري التحميل...</div>
    <div id="main" style="display:none;">
      <header>
        <h1><i class="fas fa-chart-line"></i> الراجحي للمحاسبة</h1>
        <div class="header-actions">
          <span id="user-name"></span>
          <button id="btn-help" class="btn-help" title="مساعدة"><i class="fas fa-question-circle"></i></button>
        </div>
      </header>
      <nav id="main-nav">
        <button class="tab active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</button>
        <button class="tab" data-tab="items"><i class="fas fa-boxes"></i> المواد</button>
        <button class="tab" data-tab="sale-invoice"><i class="fas fa-receipt"></i> فاتورة مبيعات</button>
        <button class="tab" data-tab="purchase-invoice"><i class="fas fa-shopping-cart"></i> فاتورة مشتريات</button>
        <button class="tab" data-tab="customers"><i class="fas fa-users"></i> العملاء</button>
        <button class="tab" data-tab="suppliers"><i class="fas fa-industry"></i> الموردين</button>
        <button class="tab" data-tab="categories"><i class="fas fa-tags"></i> التصنيفات</button>
        <button class="tab" data-tab="units"><i class="fas fa-ruler"></i> الوحدات</button>
        <button class="tab" data-tab="payments"><i class="fas fa-money-bill-wave"></i> الدفعات</button>
        <button class="tab" data-tab="expenses"><i class="fas fa-file-invoice"></i> المصاريف</button>
        <button class="tab" data-tab="invoices"><i class="fas fa-folder-open"></i> الفواتير</button>
        <button class="tab" data-tab="reports"><i class="fas fa-chart-pie"></i> التقارير</button>
      </nav>
      <div id="tab-content"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
