<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading">جاري التحميل...</div>
    <div id="main" style="display:none;">
      <header>
        <h1>الراجحي للمحاسبة</h1>
        <span id="user-name"></span>
      </header>
      <nav>
        <button class="tab active" data-tab="dashboard">لوحة التحكم</button>
        <button class="tab" data-tab="items">المواد</button>
        <button class="tab" data-tab="sale-invoice">فاتورة مبيعات</button>
        <button class="tab" data-tab="purchase-invoice">فاتورة مشتريات</button>
        <button class="tab" data-tab="customers">العملاء</button>
        <button class="tab" data-tab="suppliers">الموردين</button>
        <button class="tab" data-tab="categories">التصنيفات</button>
        <button class="tab" data-tab="payments">الدفعات</button>
        <button class="tab" data-tab="invoices">الفواتير</button>
        <button class="tab" data-tab="reports">التقارير</button>
      </nav>
      <div id="tab-content"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
