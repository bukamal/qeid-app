<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="loading" style="display:none;"><div class="loader"></div><p id="loading-msg"></p></div>
  <div id="main" style="display:none;">
    <header>
      <h1>الراجحي للمحاسبة</h1>
      <div><span id="user-name"></span> <button id="btn-help" class="btn-icon">❓</button></div>
    </header>
    <nav>
      <div class="tab active" data-tab="dashboard">📊 لوحة التحكم</div>
      <div class="tab" data-tab="items">📦 المواد</div>
      <div class="tab" data-tab="sale-invoice">🧾 فاتورة مبيعات</div>
      <div class="tab" data-tab="purchase-invoice">📥 فاتورة مشتريات</div>
      <div class="tab" data-tab="customers">👥 العملاء</div>
      <div class="tab" data-tab="suppliers">🏭 الموردين</div>
      <div class="tab" data-tab="categories">🏷️ التصنيفات</div>
      <div class="tab" data-tab="units">📏 الوحدات</div>
      <div class="tab" data-tab="payments">💰 الدفعات</div>
      <div class="tab" data-tab="expenses">📋 المصاريف</div>
      <div class="tab" data-tab="invoices">📑 الفواتير</div>
      <div class="tab" data-tab="reports">📈 التقارير</div>
    </nav>
    <main id="tab-content"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
