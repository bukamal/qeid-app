<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>الراجحي للمحاسبة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="loading" style="display:none;">
    <div class="loader"><i class="fas fa-spinner fa-pulse"></i></div>
    <p id="loading-msg"></p>
  </div>
  <div id="main" style="display:none;">
    <header>
      <div class="header-left">
        <i class="fas fa-chart-line app-icon"></i>
        <h1>الراجحي للمحاسبة</h1>
      </div>
      <div class="header-right">
        <span id="user-name"></span>
        <button id="btn-help" class="btn-icon"><i class="fas fa-question-circle"></i></button>
      </div>
    </header>
    <nav>
      <div class="tab active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</div>
      <div class="tab" data-tab="items"><i class="fas fa-boxes"></i> المواد</div>
      <div class="tab" data-tab="sale-invoice"><i class="fas fa-receipt"></i> فاتورة مبيعات</div>
      <div class="tab" data-tab="purchase-invoice"><i class="fas fa-shopping-cart"></i> فاتورة مشتريات</div>
      <div class="tab" data-tab="customers"><i class="fas fa-users"></i> العملاء</div>
      <div class="tab" data-tab="suppliers"><i class="fas fa-industry"></i> الموردين</div>
      <div class="tab" data-tab="categories"><i class="fas fa-tags"></i> التصنيفات</div>
      <div class="tab" data-tab="units"><i class="fas fa-ruler"></i> الوحدات</div>
      <div class="tab" data-tab="payments"><i class="fas fa-money-bill-wave"></i> الدفعات</div>
      <div class="tab" data-tab="expenses"><i class="fas fa-file-invoice"></i> المصاريف</div>
      <div class="tab" data-tab="invoices"><i class="fas fa-folder-open"></i> الفواتير</div>
      <div class="tab" data-tab="reports"><i class="fas fa-chart-pie"></i> التقارير</div>
    </nav>
    <main id="tab-content"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
